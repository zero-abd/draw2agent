<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; min-height: 2000px; padding-top: 500px; background: #eee; font-family: sans-serif; }
  #box { width: 100px; height: 100px; background: red; margin: 0 auto; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
  #marker { position: fixed; top: 100px; left: 100px; width: 50px; height: 50px; background: blue; color: white; z-index: 10; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <h1>Scroll down and click anywhere</h1>
  <div id="box">BOX</div>
  <div id="marker">FIXED</div>
  <script type="module">
    import * as htmlToImage from 'https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/+esm';
    
    document.onclick = async () => {
      console.log('Capturing at scrollY:', window.scrollY);
      
      const width = window.innerWidth;
      const height = window.innerHeight;
      
      const dataUrl = await htmlToImage.toPng(document.documentElement, {
        pixelRatio: window.devicePixelRatio || 1,
        width,
        height,
        style: {
          transform: `translate(${-window.scrollX}px, ${-window.scrollY}px)`,
          transformOrigin: 'top left'
        }
      });
      
      // Simulate compositeImages
      const canvas = document.createElement('canvas');
      const dpr = window.devicePixelRatio || 1;
      canvas.width = width * dpr;
      canvas.height = height * dpr;
      const ctx = canvas.getContext('2d');
      
      const bgImg = new Image();
      bgImg.onload = () => {
        // This is the current buggy code!
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
        
        const finalImg = new Image();
        finalImg.src = canvas.toDataURL('image/png');
        finalImg.style.position = 'fixed';
        finalImg.style.top = '10px';
        finalImg.style.right = '10px';
        finalImg.style.border = '5px solid green';
        finalImg.style.width = '300px';
        finalImg.style.zIndex = 9999;
        document.body.appendChild(finalImg);
        console.log('bgImg intrinsic size:', bgImg.width, bgImg.height);
        console.log('canvas size:', canvas.width, canvas.height);
      };
      bgImg.src = dataUrl;
    };
  </script>
</body>
</html>
